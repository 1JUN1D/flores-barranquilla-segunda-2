    <meta name="description" content="Catálogo completo de CASA del PETALO en Barranquilla. Conoce nuestra colección de arreglos florales, ramos, bouquets y regalos especiales con entrega a domicilio.">
    <meta name="keywords" content="catálogo flores Barranquilla, ramos, bouquets, arreglos florales, CASA del PETALO">
    <title>Catálogo de Flores - CASA del PETALO Barranquilla | Ramos y Arreglos Florales</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/catalog.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.webp">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="catalog-hero">
        <div class="container">
            <h1>Nuestro Catálogo</h1>
            <p>Recorre toda nuestra selección de ramos, cajas y arreglos hechos a mano para cada momento especial</p>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="catalog-filters">
        <div class="container">
            <div class="filters-container">
                <span class="filter-label">Filtrar por:</span>
                <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
                <button class="filter-btn" onclick="filterProducts('Rosas Rojas')">Rosas Rojas</button>
                <button class="filter-btn" onclick="filterProducts('Rosas Rosadas')">Rosas Rosadas</button>
                <button class="filter-btn" onclick="filterProducts('Rosas Amarillas')">Rosas Amarillas</button>
                <button class="filter-btn" onclick="filterProducts('Combinación de Rosas')">Combinación</button>
                <button class="filter-btn" onclick="filterProducts('Girasoles')">Girasoles</button>
                <button class="filter-btn" onclick="filterProducts('Girasoles y Rosas')">Girasoles y Rosas</button>
                <button class="filter-btn" onclick="filterProducts('Cajas Premium')">Cajas Premium</button>
                <button class="filter-btn" onclick="filterProducts('Rosas con Ferrero')">Con Ferrero</button>
                <button class="filter-btn" onclick="filterProducts('Cumpleaños')">Cumpleaños</button>
                <button class="filter-btn" onclick="filterProducts('Ramos Nupciales')">Nupciales</button>
                <button class="filter-btn" onclick="filterProducts('Arreglos Fúnebres')">Fúnebres</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="catalog-section">
        <div class="container">
            <div class="results-counter" id="resultsCounter"></div>
            <div class="products-grid" id="productsGrid">
                <!-- Los productos se cargarán con JavaScript -->
            </div>
            <div class="empty-state" id="emptyState">
                <h3>No se encontraron productos</h3>
                <p>Prueba seleccionando otra categoría del filtro</p>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <img src="" alt="" class="lightbox-image" id="lightboxImage">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxPrice"></p>
            </div>
        </div>
    </div>
